<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CRM Satlock</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f2f7;--surface:#ffffff;--surface2:#e8ecf4;
  --border:#d0d6e8;--border2:#a8b4d0;
  --text:#0d1b3e;--text2:#3d5080;--text3:#7a8db0;
  --sat-blue:#19428C;--sat-blue-light:#e8edf7;--sat-blue-dark:#0d2550;
  --sat-orange:#E8460A;--sat-orange-light:#fdeee8;--sat-orange-dark:#a33008;
  --sat-dark:#0d1b3e;
  --teal:#1D9E75;--teal-light:#E1F5EE;--teal-dark:#085041;
  --coral:#D85A30;--coral-light:#FAECE7;--coral-dark:#712B13;
  --purple:#534AB7;--purple-light:#EEEDFE;--purple-dark:#26215C;
  --amber:#BA7517;--amber-light:#FAEEDA;
  --blue:#19428C;--blue-light:#e8edf7;--blue-dark:#0d2550;
  --green:#639922;--green-light:#EAF3DE;
  --red:#E24B4A;--red-light:#FCEBEB;--red-dark:#791F1F;
  --gray:#888780;--gray-light:#F1EFE8;
  --radius:10px;--radius-sm:6px;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}

/* AUTH */
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:var(--bg)}
.auth-card{background:var(--surface);border:0.5px solid var(--border);border-top:3px solid var(--sat-orange);border-radius:16px;padding:40px;width:100%;max-width:380px}
.auth-logo{font-size:11px;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
.auth-title{font-size:22px;font-weight:500;color:var(--text);margin-bottom:32px}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:16px}
.field label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3)}
.field input{font-family:inherit;font-size:13px;padding:10px 12px;border:0.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text)}
.field input:focus{outline:none;border-color:var(--border2)}
.btn-main{width:100%;font-family:inherit;font-size:13px;font-weight:500;padding:11px;border:none;border-radius:var(--radius-sm);background:var(--sat-orange);color:#fff;cursor:pointer;margin-top:8px;transition:opacity .15s}
.btn-main:hover{opacity:.85}
.auth-err{font-size:12px;color:var(--red);margin-top:10px;display:none}

/* APP */
#app{display:none;flex-direction:column;min-height:100vh}
.topbar{background:var(--surface);border-bottom:0.5px solid var(--border);border-top:3px solid var(--sat-orange);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:52px;gap:12px}
.topbar-left{display:flex;align-items:center;gap:14px}
.brand-badge{font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;background:var(--sat-orange-light);color:var(--sat-orange);padding:3px 8px;border-radius:4px}
.topbar-title{font-size:15px;font-weight:500;color:#fff}
.user-pill{display:flex;align-items:center;gap:8px;font-size:12px;color:rgba(255,255,255,0.85)}
.user-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;background:var(--sat-orange-light);color:var(--sat-orange)}
.btn-logout{font-family:inherit;font-size:11px;color:var(--red);background:var(--red-light);border:0.5px solid var(--red);border-radius:6px;padding:5px 12px;cursor:pointer;font-weight:500}
.btn-logout:hover{background:var(--red);color:#fff;border-color:var(--red)}

.nav-tabs{background:var(--surface);border-bottom:0.5px solid var(--border);padding:0 20px;display:flex;gap:2px;overflow-x:auto}
.nav-tab{font-family:inherit;font-size:12px;font-weight:400;color:var(--text2);background:none;border:none;border-bottom:2px solid transparent;padding:10px 14px;cursor:pointer;white-space:nowrap;transition:color .12s,border-color .12s}
.nav-tab:hover{color:var(--text)}
.nav-tab.active{color:var(--sat-orange);font-weight:500;border-bottom-color:var(--sat-orange)}

.content{padding:20px;flex:1}
.panel{display:none}.panel.active{display:block}

/* MÉTRICAS */
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:20px}
.metric{background:var(--surface);border:0.5px solid var(--border);border-top:2px solid var(--sat-blue);border-radius:var(--radius);padding:14px 16px}
.metric-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:4px}
.metric-val{font-size:26px;font-weight:300;line-height:1}
.metric-sub{font-size:10px;color:var(--text3);margin-top:3px}

/* FILTROS */
.filters{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.fbtn{font-family:inherit;font-size:11px;color:var(--text2);background:var(--surface);border:0.5px solid var(--border);border-radius:20px;padding:4px 12px;cursor:pointer;transition:all .12s}
.fbtn:hover{border-color:var(--border2);color:var(--text)}
.fbtn.active{background:var(--sat-blue);color:#fff;border-color:var(--sat-blue)}
.search-box{font-family:inherit;font-size:12px;padding:5px 10px;border:0.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);width:180px;margin-left:auto}
.search-box:focus{outline:none;border-color:var(--border2)}

/* TABLA */
.table-wrap{border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:700px}
thead tr{background:var(--surface2);border-bottom:0.5px solid var(--border)}
th{text-align:left;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);padding:9px 12px}
td{padding:10px 12px;vertical-align:middle;color:var(--text);border-bottom:0.5px solid var(--border)}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--surface2)}
.mono{font-family:'Courier New',monospace;font-size:11px;color:var(--text2)}

/* PILLS */
.pill{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;white-space:nowrap}
.dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.s-en_proceso{background:var(--blue-light);color:var(--blue-dark)}.s-en_proceso .dot{background:var(--blue)}
.s-propuesta_enviada{background:var(--amber-light);color:var(--amber)}.s-propuesta_enviada .dot{background:var(--amber)}
.s-cerrado{background:var(--green-light);color:var(--green)}.s-cerrado .dot{background:var(--green)}
.s-perdido{background:var(--red-light);color:var(--red-dark)}.s-perdido .dot{background:var(--red)}
.s-sin_gestion{background:var(--gray-light);color:var(--gray)}.s-sin_gestion .dot{background:var(--gray)}

.bar-wrap{display:flex;flex-direction:column;gap:3px}
.bar-bg{height:3px;background:var(--border);border-radius:2px}
.bar-fill{height:3px;border-radius:2px}
.bar-pct{font-size:9px;color:var(--text3)}

/* FORMULARIO */
.form-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:20px}
.form-title{font-size:13px;font-weight:500;margin-bottom:16px}
.form-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
.fg{display:flex;flex-direction:column;gap:4px}
.fg.full{grid-column:1/-1}
.flbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text3)}
.finput,.fsel,.ftxt{font-family:inherit;font-size:12px;padding:8px 10px;border:0.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text)}
.finput:focus,.fsel:focus,.ftxt:focus{outline:none;border-color:var(--border2)}
.ftxt{resize:vertical;min-height:60px}
.form-actions{display:flex;gap:8px;justify-content:flex-end}
.btn-sec{font-family:inherit;font-size:12px;padding:7px 14px;border-radius:var(--radius-sm);border:0.5px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer}
.btn-pri{font-family:inherit;font-size:12px;font-weight:500;padding:7px 18px;border-radius:var(--radius-sm);border:none;background:var(--sat-orange);color:#fff;cursor:pointer;transition:opacity .15s}
.btn-pri:hover{opacity:.85}

/* AGENDA */
.agenda-item{display:flex;gap:12px;align-items:flex-start;padding:11px 14px;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);margin-bottom:8px}
.agenda-item.urgente{border-left:2px solid var(--red)}
.ag-time{font-family:'Courier New',monospace;font-size:11px;color:var(--text2);min-width:40px;padding-top:1px}
.ag-body{flex:1}
.ag-title{font-size:13px;font-weight:500}
.ag-sub{font-size:11px;color:var(--text2);margin-top:2px}
.check-box{width:16px;height:16px;border:0.5px solid var(--border2);border-radius:4px;cursor:pointer;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:background .15s}
.check-box.done{background:var(--green);border-color:var(--green)}
.check-box.done::after{content:'';width:8px;height:5px;border-left:1.5px solid white;border-bottom:1.5px solid white;transform:rotate(-45deg) translateY(-1px)}

/* PENDIENTES */
.pend-item{display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-bottom:0.5px solid var(--border)}
.pend-item:last-child{border-bottom:none}
.prio-bar{width:3px;border-radius:2px;align-self:stretch;flex-shrink:0;min-height:24px}
.prio-bar.alta{background:var(--red)}
.prio-bar.media{background:var(--amber)}
.prio-bar.baja{background:var(--border2)}
.pend-body{flex:1}
.pend-title{font-size:13px;color:var(--text)}
.pend-meta{font-size:11px;color:var(--text3);margin-top:2px}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--text3);padding:2px 5px;border-radius:4px;font-size:13px}
.icon-btn:hover{background:var(--surface2);color:var(--text)}

/* 15·5·1 */
.qco-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.qco-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center}
.qco-num{font-size:36px;font-weight:300;line-height:1;margin-bottom:4px}
.qco-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text3)}
.qco-meta{font-size:10px;color:var(--text3);margin-top:3px}
.qco-meta span{font-weight:600;color:var(--text2)}
.progress-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.progress-lbl{font-size:11px;color:var(--text2);width:90px;flex-shrink:0}
.progress-bg{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:6px;border-radius:3px;transition:width .4s}
.progress-pct{font-size:11px;color:var(--text3);min-width:32px;text-align:right}

/* CONSOLIDADO */
.exec-row{display:grid;grid-template-columns:180px 1fr 80px 80px 80px 100px;gap:10px;align-items:center;padding:12px 0;border-bottom:0.5px solid var(--border)}
.exec-row:last-child{border-bottom:none}
.exec-name{font-size:13px;font-weight:500}
.exec-sub{font-size:11px;color:var(--text3)}

.section-hdr{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin:20px 0 10px}
.section-hdr:first-child{margin-top:0}
.empty{text-align:center;padding:32px;color:var(--text3);font-size:12px}
.badge-linea{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:2px 6px;border-radius:3px}
.badge-fleet{background:var(--teal-light);color:var(--teal-dark)}
.badge-carga{background:var(--coral-light);color:var(--coral-dark)}
.loading{text-align:center;padding:40px;color:var(--text3);font-size:12px}

/* ── 15·5·1 Dashboard styles (original) ── */
.qco-podio{display:flex;justify-content:center;align-items:flex-end;gap:16px;margin-bottom:20px;padding:16px 0;flex-wrap:wrap}
.qco-podio-item{display:flex;flex-direction:column;align-items:center;gap:6px}
.qco-podio-avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;border:3px solid transparent;font-size:1rem}
.qco-podio-item.p1 .qco-podio-avatar{width:60px;height:60px;font-size:1.1rem;border-color:#FFD700;box-shadow:0 0 16px rgba(255,215,0,.35)}
.qco-podio-item.p2 .qco-podio-avatar{width:50px;height:50px;border-color:#C0C0C0}
.qco-podio-item.p3 .qco-podio-avatar{width:44px;height:44px;border-color:#CD7F32}
.qco-podio-crown{font-size:1.1rem;margin-bottom:-4px}
.qco-podio-name{font-size:11px;font-weight:600;text-align:center;max-width:72px;color:var(--text)}
.qco-podio-score{font-size:1rem;font-weight:700;color:var(--sat-orange);font-family:'Courier New',monospace}

.exec-card-151{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:16px 18px;position:relative;overflow:hidden}
.exec-card-151::before{content:"";position:absolute;top:0;left:0;bottom:0;width:4px;border-radius:2px 0 0 2px}
.exec-card-151.ec-green::before{background:#639922}
.exec-card-151.ec-yellow::before{background:#BA7517}
.exec-card-151.ec-red::before{background:#E24B4A}
.exec-avatar-151{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:700;color:#fff;flex-shrink:0}
.exec-grid-151{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:16px}
.m151-bar{height:5px;background:var(--border);border-radius:999px;overflow:hidden;margin-top:3px}
.m151-fill{height:100%;border-radius:999px;transition:width .8s cubic-bezier(.16,1,.3,1)}
.m151-fill.green{background:#639922}
.m151-fill.yellow{background:#BA7517}
.m151-fill.red{background:#E24B4A}
.score-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px}

/* ── Modal edición ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:1000;display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
.modal-box{background:var(--surface);border:0.5px solid var(--border);border-radius:16px;padding:24px;width:100%;max-width:560px;position:relative}
.modal-title{font-size:14px;font-weight:500;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center}
.modal-close{background:none;border:none;cursor:pointer;font-size:18px;color:var(--text3);line-height:1;padding:2px 6px;border-radius:4px}
.modal-close:hover{background:var(--surface2);color:var(--text)}

/* ── Calendario ── */
.cal-wrap{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden}
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:0.5px solid var(--border)}
.cal-nav{background:none;border:0.5px solid var(--border);border-radius:6px;padding:4px 10px;cursor:pointer;font-family:inherit;font-size:12px;color:var(--text2)}
.cal-nav:hover{background:var(--surface2)}
.cal-title{font-size:13px;font-weight:500;color:var(--text)}
.cal-toggle{display:flex;gap:4px}
.cal-toggle-btn{font-family:inherit;font-size:11px;padding:4px 10px;border-radius:6px;border:0.5px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer}
.cal-toggle-btn.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.cal-grid-month{display:grid;grid-template-columns:repeat(7,1fr);gap:0}
.cal-dow{text-align:center;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);padding:8px 4px;border-bottom:0.5px solid var(--border)}
.cal-day{min-height:72px;padding:6px;border-right:0.5px solid var(--border);border-bottom:0.5px solid var(--border);cursor:pointer;transition:background .1s;vertical-align:top}
.cal-day:nth-child(7n){border-right:none}
.cal-day:hover{background:var(--surface2)}
.cal-day.other-month .cal-day-num{color:var(--text3);opacity:.4}
.cal-day.today .cal-day-num{background:var(--sat-orange);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-weight:600}
.cal-day-num{font-size:12px;font-weight:500;color:var(--text);margin-bottom:4px;width:22px;height:22px;display:flex;align-items:center;justify-content:center}
.cal-event{font-size:10px;padding:2px 5px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.cal-event.urgente{background:var(--red-light);color:var(--red-dark)}
.cal-event.normal{background:var(--blue-light);color:var(--blue-dark)}
.cal-event.done{background:var(--surface2);color:var(--text3);text-decoration:line-through}

/* Semana */
.cal-week-grid{display:grid;grid-template-columns:52px repeat(7,1fr);gap:0}
.cal-week-col-hdr{text-align:center;padding:8px 4px;border-bottom:0.5px solid var(--border);border-right:0.5px solid var(--border);font-size:11px}
.cal-week-col-hdr.today-col{background:var(--sat-orange-light);color:var(--sat-orange)}
.cal-week-col-hdr:last-child{border-right:none}
.cal-week-time{font-size:10px;color:var(--text3);font-family:'Courier New',monospace;padding:0 6px;height:48px;display:flex;align-items:flex-start;padding-top:4px;border-right:0.5px solid var(--border);border-bottom:0.5px solid var(--border)}
.cal-week-cell{height:48px;border-right:0.5px solid var(--border);border-bottom:0.5px solid var(--border);padding:2px 3px;cursor:pointer;transition:background .1s;position:relative}
.cal-week-cell:last-child{border-right:none}
.cal-week-cell:hover{background:var(--surface2)}
.cal-week-event{font-size:10px;padding:2px 5px;border-radius:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.add-event-hint{font-size:9px;color:var(--text3);position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0}
.cal-week-cell:hover .add-event-hint{opacity:1}


/* ── Agenda estilo Google Calendar ── */
.cal-container{display:flex;flex-direction:column;height:calc(100vh - 180px);min-height:500px;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);overflow:visible}
.cal-toolbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:0.5px solid var(--border);flex-shrink:0;gap:8px;flex-wrap:wrap}
.cal-nav-group{display:flex;align-items:center;gap:4px}
.cal-nav-btn{background:none;border:0.5px solid var(--border);border-radius:6px;padding:4px 10px;cursor:pointer;font-family:inherit;font-size:12px;color:var(--text2);transition:all .12s}
.cal-nav-btn:hover{background:var(--surface2);color:var(--text)}
.cal-today-btn{background:var(--sat-blue);color:#fff;border-color:var(--sat-blue);font-weight:500}
.cal-today-btn:hover{background:var(--sat-blue-dark)}
.cal-period-title{font-size:15px;font-weight:500;color:var(--text)}
.cal-view-toggle{display:flex;border:0.5px solid var(--border);border-radius:6px;overflow:hidden}
.cal-view-btn{background:none;border:none;border-right:0.5px solid var(--border);padding:5px 12px;cursor:pointer;font-family:inherit;font-size:11px;font-weight:500;color:var(--text2);transition:all .12s}
.cal-view-btn:last-child{border-right:none}
.cal-view-btn.active{background:var(--sat-blue);color:#fff}
.cal-view-btn:hover:not(.active){background:var(--surface2)}

/* Vista mensual */
.cal-month-wrap{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.cal-month-header{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:0.5px solid var(--border);flex-shrink:0}
.cal-month-dow{text-align:center;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);padding:8px 0}
.cal-month-grid{display:grid;grid-template-columns:repeat(7,1fr);flex:1}
.cal-month-cell{border-right:0.5px solid var(--border);border-bottom:0.5px solid var(--border);padding:4px;min-height:90px;cursor:pointer;transition:background .1s;position:relative}
.cal-month-cell:nth-child(7n){border-right:none}
.cal-month-cell:hover{background:var(--surface2)}
.cal-month-cell.other-month{background:var(--surface2);opacity:.6}
.cal-month-cell.today{background:var(--sat-blue-light)}
.cal-month-num{font-size:12px;font-weight:400;color:var(--text2);width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:50%;margin-bottom:2px}
.cal-month-cell.today .cal-month-num{background:var(--sat-blue);color:#fff;font-weight:600}
.cal-month-event{font-size:11px;padding:2px 6px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;display:block;line-height:1.4}
.cal-month-event.ev-satlock{background:var(--sat-blue-light);color:var(--sat-blue);border-left:2px solid var(--sat-blue)}
.cal-month-event.ev-google{background:#e8f0fe;color:#1a73e8;border-left:2px solid #1a73e8}
.cal-month-event.ev-urgente{background:var(--red-light);color:var(--red-dark);border-left:2px solid var(--red)}
.cal-month-event.ev-done{background:var(--surface2);color:var(--text3);text-decoration:line-through;border-left:2px solid var(--border)}
.cal-month-more{font-size:10px;color:var(--sat-blue);cursor:pointer;padding:1px 4px}

/* Vista semanal */
.cal-week-wrap{flex:1;overflow:hidden;display:flex;flex-direction:column}
.cal-week-header{display:grid;border-bottom:0.5px solid var(--border);flex-shrink:0}
.cal-week-day-hdr{text-align:center;padding:8px 4px;border-right:0.5px solid var(--border)}
.cal-week-day-hdr:last-child{border-right:none}
.cal-week-day-name{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text3)}
.cal-week-day-num{font-size:22px;font-weight:300;color:var(--text);line-height:1.1;margin-top:2px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:50%;margin:2px auto 0}
.cal-week-day-num.today-num{background:var(--sat-blue);color:#fff;font-weight:500}
.cal-week-body{flex:1;overflow-y:auto;position:relative}
.cal-week-scroll{display:grid;position:relative}
.cal-time-col{display:flex;flex-direction:column}
.cal-time-slot{height:60px;border-bottom:0.5px solid var(--border);display:flex;align-items:flex-start;padding:2px 8px 0;flex-shrink:0}
.cal-time-slot.quarter{height:15px;border-bottom:0.5px dashed var(--border);opacity:.4}
.cal-time-label{font-size:10px;color:var(--text3);font-family:'Courier New',monospace;white-space:nowrap;margin-top:-6px}

.cal-day-col:last-child{border-right:none}

.cal-quarter-line{height:15px;border-bottom:0.5px dashed rgba(0,0,0,.06)}
.cal-event-block{position:absolute;left:2px;right:2px;border-radius:4px;padding:3px 6px;font-size:11px;cursor:pointer;overflow:hidden;transition:opacity .15s;z-index:10}
.cal-event-block:hover{opacity:.85;z-index:20}
.cal-event-block.ev-satlock{background:#c8d8f4;border-left:3px solid var(--sat-blue);color:var(--sat-blue-dark)}
.cal-event-block.ev-google{background:#d2e3fc;border-left:3px solid #1a73e8;color:#174ea6}

.cal-event-block.ev-done{background:var(--surface2);border-left:3px solid var(--border);color:var(--text3)}
.cal-event-title{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-event-time{font-size:10px;opacity:.75}
.cal-now-line{position:absolute;left:0;right:0;height:2px;background:var(--sat-orange);z-index:3;pointer-events:none}

function mostrarFormNuevaPassword(){

async function guardarNuevaPassword(){
  const pass = document.getElementById('new-pass')?.value;
  const confirm = document.getElementById('new-pass-confirm')?.value;
  const err = document.getElementById('np-err');
  if(!pass||pass.length<6){
    err.textContent='La contraseña debe tener al menos 6 caracteres.';
    err.style.display='block'; return;
  }
  if(pass!==confirm){
    err.textContent='Las contraseñas no coinciden.';
    err.style.display='block'; return;
  }
  const {error} = await sb.auth.updateUser({password: pass});
  if(error){
    err.textContent='Error: '+error.message;
    err.style.display='block'; return;
  }
  alert('Contraseña actualizada correctamente. Inicie sesión con su nueva contraseña.');
  window.location.hash='';
  window.location.reload();
}

async function recuperarPassword(){
  const email=document.getElementById('auth-email').value.trim();
  if(!email){
    const err=document.getElementById('auth-err');
    err.textContent='Ingrese su correo electrónico primero.';
    err.style.display='block';
    return;
  }
  if(!sb) return;
  const {error}=await sb.auth.resetPasswordForEmail(email,{
    redirectTo:'https://satlockfleet.github.io/crm-satlock/index.html'
  });
  const err=document.getElementById('auth-err');
  if(error){
    err.textContent='Error: '+error.message;
    err.style.display='block';
  } else {
    err.style.color='var(--green)';
    err.textContent='Se envió un enlace de recuperación a '+email+'. Revise su correo.';
    err.style.display='block';
  }
}

  if(!email||!pass){err.textContent='Complete los dos campos.';err.style.display='block';return;}
  btn.textContent='Ingresando...';btn.disabled=true;
  btn.style.opacity='0.7';
  const lb=document.getElementById('loading-bar');if(lb)lb.classList.add('active');
  try{
    const {data,error} = await sb.auth.signInWithPassword({email,password:pass});
    if(error){
      const msg = error.message.includes('Invalid login credentials')
        ? 'Correo o contraseña incorrectos. Verifique sus datos.'
        : error.message.includes('Email not confirmed')
        ? 'Correo no confirmado. Revise su bandeja de entrada.'
        : error.message.includes('Too many requests')
        ? 'Demasiados intentos. Espere unos minutos.'
        : 'Error al ingresar: '+error.message;
      err.textContent = msg;
      err.style.display='block';
      err.style.color='var(--red)';
      err.style.background='var(--red-light)';
      err.style.padding='8px 12px';
      err.style.borderRadius='6px';
      err.style.border='0.5px solid var(--red)';
      btn.textContent='Ingresar';btn.disabled=false;btn.style.opacity='1';
      return;
    }
    USER = data.user;
    await cargarPerfil();
  }catch(e){
    err.textContent='Error de conexión: '+e.message;
    err.style.display='block';
    btn.textContent='Ingresar';btn.disabled=false;
  }
}
async function cargarPerfil(){
  const btn=document.querySelector('.btn-main');
  const {data,error} = await sb.from('usuarios').select('*').eq('id',USER.id).single();
  if(error||!data){
    const err=document.getElementById('auth-err');
    err.textContent='Usuario sin perfil configurado. Contacte al administrador. ('+(error?.message||'sin datos')+')';
    err.style.display='block';
    if(btn){btn.textContent='Ingresar';btn.disabled=false;}
    await sb.auth.signOut();return;
  }
  PERFIL = data;
  iniciarApp();
}
async function logout(){
  await sb.auth.signOut();
  USER=null;PERFIL=null;
  document.getElementById('app').style.display='none';
  document.getElementById('auth-screen').style.display='flex';
}

  setTimeout(initGoogleAuth, 500);
  if(!sb){console.error('Supabase no inicializado');return;}
  sb.auth.onAuthStateChange(async(event,session)=>{
    if(event==='PASSWORD_RECOVERY'){

      mostrarFormNuevaPassword();

});

function iniciarApp(){
  const authScreen=document.getElementById('auth-screen');
  const appEl=document.getElementById('app');
  if(!authScreen||!appEl){setTimeout(iniciarApp,100);return;}
  authScreen.style.display='none';
  appEl.style.display='flex';
  const lb=document.getElementById('loading-bar');if(lb){lb.classList.remove('active');lb.style.width='100%';setTimeout(()=>{lb.style.opacity='0';},300);}
  const ini = PERFIL.nombre.split(' ').map(p=>p[0]).join('').slice(0,2).toUpperCase();
  document.getElementById('user-avatar').textContent=ini;
  document.getElementById('user-name-top').textContent=PERFIL.nombre;

  const tabs = construirTabs();
  const nav = document.getElementById('nav-tabs');
  nav.innerHTML = tabs.map((t,i)=>`<button class="nav-tab${i===0?' active':''}" onclick="switchTab(${i})" data-idx="${i}">${t.label}</button>`).join('');
  renderTab(0,tabs);
}

function construirTabs(){
  const base = [
    {label:'Seguimiento',render:renderSeguimiento},
    {label:'+ Nueva oportunidad',render:renderNueva},
    {label:'Mi día',render:renderDiario},
    {label:'Agenda',render:renderAgenda},
    {label:'15 · 5 · 1',render:renderQCO},
  ];
  if(['gerencia','jefe_fleet','jefe_proyectos'].includes(PERFIL.rol)){
    base.push({label:'Consolidado equipo',render:renderConsolidado});
    base.push({label:'KPIs & Analytics',render:renderKPIs});
  }
  if(['alta_gerencia','gerencia','jefe_fleet'].includes(PERFIL.rol)){
    base.push({label:'Alta Gerencia',render:renderAltaGerencia});
  }
  return base;
}

let TABS = [];
function switchTab(idx){
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.querySelector(`.nav-tab[data-idx="${idx}"]`).classList.add('active');
  renderTab(idx, construirTabs());
}
function renderTab(idx,tabs){
  TABS = tabs;
  const content = document.getElementById('main-content');
  content.innerHTML='<div class="loading">Cargando...</div>';
  tabs[idx].render(content);
}

async function renderSeguimiento(container){
  const verTodos = window._segVerTodos || false;
  // Leer filtro de ejecutivo del DOM si existe
  const selectExec = document.getElementById('seg-filtro-exec');
  if(selectExec) window._segFiltroExec = selectExec.value;
  // Si hay un ejecutivo seleccionado, activar automáticamente verTodos
  const verTodosEfectivo = verTodos || !!window._segFiltroExec;
  // Cargar lista de ejecutivos para el filtro si no están cargados
  if(['gerencia','jefe_fleet','jefe_proyectos'].includes(PERFIL.rol) && (!window._segUsuarios || !window._segUsuarios.length)){
    const {data:segUsers} = await sb.from('usuarios').select('id,nombre,rol,linea').neq('rol','gerencia').neq('rol','alta_gerencia').order('nombre');
    window._segUsuarios = segUsers||[];
  }
  let query = sb.from('oportunidades').select('*,usuarios(nombre,linea,cargo)').order('fecha',{ascending:false});
  if(PERFIL.rol==='ejecutivo_fleet'||PERFIL.rol==='ejecutivo_carga'){
    query = query.eq('usuario_id',USER.id);
  } else if((PERFIL.rol==='jefe_fleet'||PERFIL.rol==='gerencia'||PERFIL.rol==='jefe_proyectos'||PERFIL.rol==='alta_gerencia') && !verTodosEfectivo){
    query = query.eq('usuario_id',USER.id);
  }
  // Aplicar filtro de ejecutivo específico
  if(window._segFiltroExec) query = query.eq('usuario_id', window._segFiltroExec);

    <div id="metrics-row" class="metrics"></div>

    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap">

        Ver todos los ejecutivos
      </label>
      ${window._segVerTodos?`
      <select class="fsel" id="seg-filtro-exec" onchange="renderSeguimiento(document.getElementById('main-content'))" style="font-size:11px;padding:4px 8px">
        <option value="">Todos los ejecutivos</option>
        ${(window._segUsuarios||[]).map(u=>`<option value="${u.id}"${window._segFiltroExec===u.id?' selected':''}>${u.nombre}</option>`).join('')}
      </select>
      `:''}
    </div>`:''}
    <div class="filters">
      <button class="fbtn active" onclick="setFiltro('todos',this)">Todos</button>
      <button class="fbtn" onclick="setFiltro('en_proceso',this)">En proceso</button>
      <button class="fbtn" onclick="setFiltro('propuesta_enviada',this)">Prop. enviada</button>
      <button class="fbtn" onclick="setFiltro('cerrado',this)">Cerrado</button>

      <input class="search-box" type="text" placeholder="Buscar..." oninput="buscarOp(this.value)"/>
    </div>

      <thead><tr>
        <th>Fecha</th><th>Cliente</th><th>Contacto</th><th>Producto</th>
        <th>N° propuesta</th><th>Próx. acción</th><th>Días</th><th>Avance</th><th>Estado</th>

  window._lastRows = rows;
  renderMetrics(rows);

async function cambiarEstado(id,estadoActual){
  const keys=Object.keys(ESTADOS);
  const siguiente=keys[(keys.indexOf(estadoActual)+1)%keys.length];
  const update={estado:siguiente};
  if(siguiente==='cerrado') update.avance=100;
  if(siguiente==='perdido') update.avance=0;
  await sb.from('oportunidades').update(update).eq('id',id);
  if(siguiente==='propuesta_enviada') await registrarQCOAuto(0,1,0);
  else if(siguiente==='cerrado') await registrarQCOAuto(0,0,1);
  // Actualizar _lastRows localmente para reflejar el cambio sin recargar
  if(window._lastRows){
    const r=window._lastRows.find(x=>x.id===id);
    if(r){r.estado=siguiente;if(siguiente==='cerrado')r.avance=100;if(siguiente==='perdido')r.avance=0;}
  }
  switchTab(0);
}

function calcularTamanoNegocio(){
  const REC_MESES = {mensual:1, trimestral:3, semestral:6, anual:12};

  // Venta única
  const unidades = parseInt(document.getElementById('f-unidades')?.value||'0');
  const valorUnitStr = (document.getElementById('f-valor-unit')?.dataset?.raw||document.getElementById('f-valor-unit')?.value||'0').replace(/[^0-9]/g,'');
  const valorUnit = parseFloat(valorUnitStr)||0;
  const totalUnica = unidades * valorUnit;
  const elU = document.getElementById('f-total-unica');
  if(elU) elU.value = totalUnica>0 ? totalUnica.toLocaleString('es-CO') : '';

  // Instalación
  const unidadesInst = parseInt(document.getElementById('f-unidades-inst')?.value||'0');
  const valorInstStr = (document.getElementById('f-valor-inst')?.dataset?.raw||document.getElementById('f-valor-inst')?.value||'0').replace(/[^0-9]/g,'');
  const valorInst = parseFloat(valorInstStr)||0;
  const totalInst = unidadesInst * valorInst;
  const elI = document.getElementById('f-total-inst');
  if(elI) elI.value = totalInst>0 ? totalInst.toLocaleString('es-CO') : '';

  // Recurrencia
  const unidadesRec = parseInt(document.getElementById('f-unidades-rec')?.value||'0');
  const valorRecStr = (document.getElementById('f-valor-rec')?.dataset?.raw||document.getElementById('f-valor-rec')?.value||'0').replace(/[^0-9]/g,'');
  const valorRec = parseFloat(valorRecStr)||0;
  const tipoRec = document.getElementById('f-tipo-rec')?.value||'mensual';
  const mesesPeriodo = REC_MESES[tipoRec]||1;
  const totalRecPeriodo = unidadesRec * valorRec;
  const recMensual = totalRecPeriodo / mesesPeriodo;

  const elR = document.getElementById('f-total-rec');
  if(elR) elR.value = totalRecPeriodo>0 ? totalRecPeriodo.toLocaleString('es-CO') : '';
  const elRM = document.getElementById('f-rec-mensual');
  if(elRM) elRM.value = recMensual>0 ? recMensual.toLocaleString('es-CO') : '';

  // Pipeline total (venta única + instalación + recurrencia mensual)
  const totalPipeline = totalUnica + totalInst + recMensual;
  const el = document.getElementById('f-tamano');
  if(el) el.value = totalPipeline>0 ? totalPipeline.toLocaleString('es-CO') : '';

  // Total primera factura = venta única + instalación + primera recurrencia anticipada (valor del período)
  const primeraFactura = totalUnica + totalInst + totalRecPeriodo;
  const elF = document.getElementById('f-primera-factura');
  if(elF) elF.value = primeraFactura>0 ? primeraFactura.toLocaleString('es-CO') : '';
}

async function generarNumeroPropuesta(campoId){
  campoId = campoId || 'f-numprop';
  // Detectar país del ejecutivo para el prefijo
  // Ecuador: EGC-DDMMAA-XXXX, Colombia/México: GC-DDMMAA-XXXX
  const paisVal = document.getElementById('f-pais')?.value || document.getElementById('e-pais')?.value || '';
  const esEcuador = PERFIL?.regional?.toLowerCase().includes('ecuador') || paisVal === 'Ecuador';
  const esMexico = paisVal === 'México';
  const prefijo = esEcuador ? 'EGC' : esMexico ? 'MGC' : 'GC';
  
  // Consultar el último consecutivo global
  const {data} = await sb.from('oportunidades')
    .select('num_propuesta')
    .or('num_propuesta.like.GC%,num_propuesta.like.EGC%,num_propuesta.like.MGC%')
    .order('created_at',{ascending:false})
    .limit(50);
  
  let maxConsec = 0;
  (data||[]).forEach(o=>{
    if(!o.num_propuesta) return;
    const m = o.num_propuesta.match(/(?:EGC|GC)-\d{6}-(\d{4})/);
    if(m) maxConsec = Math.max(maxConsec, parseInt(m[1]));
    // También buscar formato antiguo CRM
    const m2 = o.num_propuesta.match(/CRM(\d{4})/);
    if(m2) maxConsec = Math.max(maxConsec, parseInt(m2[1]));
  });
  
  const consecutivo = maxConsec + 1;
  const hoy = new Date();
  const dd=String(hoy.getDate()).padStart(2,'0');
  const mm=String(hoy.getMonth()+1).padStart(2,'0');
  const yy=String(hoy.getFullYear()).slice(-2);
  const num = `${prefijo}-${dd}${mm}${yy}-${String(consecutivo).padStart(4,'0')}`;
  const el = document.getElementById(campoId);
  if(el) el.value = num;
}

  if(error){alert('Error al guardar: '+error.message);return;}
  if(esLeadNuevo) await registrarQCOAuto(1,estadoInicial==='propuesta_enviada'?1:0,estadoInicial==='cerrado'?1:0);
  else if(estadoInicial==='propuesta_enviada') await registrarQCOAuto(0,1,0);
  else if(estadoInicial==='cerrado') await registrarQCOAuto(0,0,1);
  switchTab(0);
}

function diasGestion(fechaInicio, fechaFin){
  if(!fechaInicio) return null;
  const fin = fechaFin ? new Date(fechaFin) : new Date();
  const ini = new Date(fechaInicio);
  return Math.floor((fin - ini) / (1000*60*60*24));
}

function badgeDiasGestion(dias, estado){
  if(dias===null) return '—';
  const cerrado = estado==='cerrado'||estado==='perdido';
  let color, bg, label;
  if(cerrado){
    // Negocio cerrado/perdido: mostrar total en días
    if(dias<=30){color='#27500A';bg='#EAF3DE';}
    else if(dias<=60){color='#633806';bg='#FAEEDA';}
    else{color='#791F1F';bg:'#FCEBEB';}
    label=dias+'d';
  } else {
    // En proceso: semáforo de urgencia
    if(dias<=15){color='#27500A';bg='#EAF3DE';label=dias+'d';}
    else if(dias<=30){color='#633806';bg='#FAEEDA';label=dias+'d ⚠';}
    else{color='#791F1F';bg='#FCEBEB';label=dias+'d !';}
  }
  return `<span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;background:${bg};color:${color}">${label}</span>`;
}

async function registrarQCOAuto(contactos,cotizaciones,cierres){
  if(contactos===0&&cotizaciones===0&&cierres===0)return;
  const hoy=new Date();
  await sb.from('quince_cinco_uno').insert({
    usuario_id:USER.id,fecha:hoy.toISOString().split('T')[0],
    contactos,cotizaciones,cierres,
    mes:hoy.getMonth()+1,anio:hoy.getFullYear(),
    semana:getQuincenaActual()===1?1:3,fuente:'automatico'
  });
}

async function initGoogleAuth(){
  // Verificar si el token guardado sigue vigente
  const savedToken = localStorage.getItem('gcal_token');
  const savedExpiry = parseInt(localStorage.getItem('gcal_token_expiry')||'0');
  if(savedToken && savedExpiry > Date.now() + 60000){
    gcalToken = savedToken;
    gcalTokenExpiry = savedExpiry;
    actualizarBtnGcal(true);
    programarRenovacion();
    return;
  }

  if(!window.google || !window.google.accounts){
    if(!document.querySelector('script[src*="accounts.google.com"]')){
      const s=document.createElement('script');
      s.src='https://accounts.google.com/gsi/client';
      s.onload=()=>initGoogleAuth();
      s.onerror=()=>console.warn('No se pudo cargar Google Identity Services');
      document.head.appendChild(s);
    }
    return;
  }

  // Token Client — implicit flow
  gcalTokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GCAL_CLIENT_ID,
    scope: GCAL_SCOPES,
    callback: (response)=>{
      if(response.error){ console.error('GCal error:', response.error); return; }
      gcalToken = response.access_token;
      gcalTokenExpiry = Date.now() + (response.expires_in||3600)*1000;
      localStorage.setItem('gcal_token', gcalToken);
      localStorage.setItem('gcal_token_expiry', String(gcalTokenExpiry));
      actualizarBtnGcal(true);
      drawCal();
      programarRenovacion();
    }
  });
  // NO llamar requestAccessToken aquí — solo cuando el usuario haga clic
}

async function enviarCorreoGmail({para, cc='', asunto, cuerpo, opId, adjuntos=[]}){
  if(!gcalToken){
    alert('Debe conectar Google Calendar/Gmail primero para enviar correos.');
    return false;
  }
  const boundary = 'satlock_'+Date.now();
  let rawParts = [
    `To: ${para}`,
    ...(cc?[`Cc: ${cc}`]:[]),
    `Subject: =?UTF-8?B?${btoa(unescape(encodeURIComponent(asunto)))}?=`,
    'MIME-Version: 1.0',
  ];

  if(adjuntos.length){
    rawParts.push(`Content-Type: multipart/mixed; boundary="${boundary}"`, '');
    rawParts.push(`--${boundary}`);
    rawParts.push('Content-Type: text/html; charset=UTF-8', 'Content-Transfer-Encoding: quoted-printable', '', cuerpo);
    for(const adj of adjuntos){
      rawParts.push(`--${boundary}`);
      rawParts.push(`Content-Type: ${adj.tipo||'application/octet-stream'}; name="${adj.nombre}"`);
      rawParts.push(`Content-Disposition: attachment; filename="${adj.nombre}"`);
      rawParts.push('Content-Transfer-Encoding: base64', '', adj.datos);
    }
    rawParts.push(`--${boundary}--`);
  } else {
    rawParts.push('Content-Type: text/html; charset=UTF-8', '', cuerpo);
  }

  const mensaje = rawParts.join('\r\n');
  const base64 = btoa(unescape(encodeURIComponent(mensaje))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
  try {
    const res = await fetch('https://gmail.googleapis.com/gmail/v1/users/me/messages/send', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer '+gcalToken,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({raw: base64})
    });
    if(res.ok){
      // Registrar la gestión automáticamente
      if(opId){
        await sb.from('gestiones').insert({
          oportunidad_id: opId,
          usuario_id: USER.id,
          fecha: fechaHoyLocal(),
          tipo: 'correo',
          nota: 'Correo enviado: '+asunto,
          proxima_gestion: null
        });
      }
      return true;
    } else {
      const err = await res.json();
      console.error('Gmail error:', err);
      alert('Error al enviar: '+(err.error?.message||'Error desconocido'));
      return false;
    }
  } catch(e){
    alert('Error de conexión: '+e.message);
    return false;
  }
}

async function confirmarEnvioCorreo(opId){
  const para = document.getElementById('mc-para')?.value.trim();
  const asunto = document.getElementById('mc-asunto')?.value.trim();
  let cuerpoTxt = document.getElementById('mc-cuerpo')?.value.trim();
  const driveLink = document.getElementById('mc-drive-link')?.value.trim();
  const archivos = document.getElementById('mc-archivo')?.files;
  if(!para){alert('Ingrese el correo del destinatario.');return;}
  if(!asunto){alert('Ingrese el asunto del correo.');return;}
  if(!cuerpoTxt){alert('Escriba el mensaje.');return;}

  // Agregar link de Drive al cuerpo si existe
  if(driveLink){
    cuerpoTxt += '\n\nArchivo adjunto en Drive:\n'+driveLink;
  }

  const btn = document.querySelector('#modal-correo .btn-pri');
  if(btn){btn.textContent='Enviando...';btn.disabled=true;}

  // Convertir texto a HTML
  let cuerpoHtml = '<p>'+cuerpoTxt.replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>')+'</p>';
  if(driveLink){
    cuerpoHtml += `<p><a href="${driveLink}" style="color:#19428C">📎 Ver archivo en Google Drive</a></p>`;
  }

  // Leer archivos adjuntos
  let adjuntos = [];
  if(archivos && archivos.length){
    for(const file of archivos){
      if(file.size > 5*1024*1024){ alert(`El archivo "${file.name}" supera 5 MB.`); if(btn){btn.textContent='✉ Enviar correo';btn.disabled=false;} return; }
      const b64 = await new Promise((res,rej)=>{
        const reader = new FileReader();
        reader.onload = e => res(e.target.result.split(',')[1]);
        reader.onerror = rej;
        reader.readAsDataURL(file);
      });
      adjuntos.push({nombre:file.name, tipo:file.type, datos:b64});
    }
  }

  const cc = document.getElementById('mc-cc')?.value.trim()||'';
  const ok = await enviarCorreoGmail({para, cc, asunto, cuerpo:cuerpoHtml, opId, adjuntos});
  if(ok){
    document.getElementById('modal-correo').remove();
    alert('Correo enviado correctamente y gestión registrada.');
    const fichaEl = document.getElementById('fp-actividad');
    if(fichaEl) cargarTimeline(opId);
  } else {
    if(btn){btn.textContent='✉ Enviar correo';btn.disabled=false;}
  }
}

async function renovarTokenGcal(){
  // Con implicit flow, la renovación requiere acción del usuario
  // Si el token expiró, marcar como desconectado y pedir reconexión
  if(gcalTokenExpiry && gcalTokenExpiry < Date.now()){
    gcalToken = null;
    localStorage.removeItem('gcal_token');
    localStorage.removeItem('gcal_token_expiry');
    actualizarBtnGcal(false);
    console.log('Token GCal expirado — reconexión requerida');
    return false;
  }
  return gcalToken ? true : false;
}

function programarRenovacion(){
  const tiempoRestante = gcalTokenExpiry - Date.now() - 300000; // 5 min antes
  if(tiempoRestante <= 0) return;
  setTimeout(()=>{
    if(gcalToken && gcalTokenClient){
      // Renovar silenciosamente con prompt vacío — requiere que el browser permita
      // Si el browser bloquea, el token simplemente expira y el usuario reconecta
      try {
        gcalTokenClient.requestAccessToken({prompt:''});
      } catch(e){
        console.log('Renovación automática bloqueada — el usuario deberá reconectar');
      }
    }
  }, tiempoRestante);
}

function conectarGcal(){
  if(!gcalTokenClient){
    // Intentar inicializar de nuevo
    initGoogleAuth();
    setTimeout(()=>{
      if(!gcalTokenClient){
        alert('Google Calendar no pudo cargar. Verifique su conexión y recargue la página.');
      } else {
        gcalTokenClient.requestAccessToken({prompt:'consent'});
      }
    }, 1500);
    return;
  }
  if(gcalToken){ desconectarGcal(); return; }
  gcalTokenClient.requestAccessToken({prompt:'consent'});
}

function desconectarGcal(){
  if(gcalToken) google.accounts.oauth2.revoke(gcalToken);
  gcalToken = null;
  localStorage.removeItem('gcal_token');
  actualizarBtnGcal(false);
  drawCal();
}

function actualizarBtnGcal(conectado){
  const btns = document.querySelectorAll('.gcal-connect-btn');
  btns.forEach(btn=>{
    if(conectado){
      btn.textContent = 'Google Calendar conectado';
      btn.classList.add('connected');
    } else {
      btn.textContent = 'Conectar Google Calendar';
      btn.classList.remove('connected');
    }
  });
}

async function fetchGcalEvents(fechaInicio, fechaFin){
  if(!gcalToken) return [];
  try{
    const url = `https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${fechaInicio}T00:00:00-05:00&timeMax=${fechaFin}T23:59:59-05:00&singleEvents=true&orderBy=startTime&maxResults=50&timeZone=America/Bogota`;
    const res = await fetch(url, {
      headers:{ Authorization: `Bearer ${gcalToken}` }
    });
    if(res.status === 401){ gcalToken=null; localStorage.removeItem('gcal_token'); actualizarBtnGcal(false); return []; }
    const data = await res.json();
    if(data.items&&data.items.length) console.log('GCal primer evento raw:', JSON.stringify(data.items[0].start));
    return (data.items||[]).map(ev=>{
      // Tomar fecha directamente del string para evitar problemas de zona horaria
      const startStr = ev.start.dateTime||ev.start.date||'';
      // Si tiene offset de zona horaria (ej: 2026-04-14T08:00:00-05:00)
      // extraer solo la parte de fecha local (antes de T)
      const fecha = startStr.includes('T') ? startStr.split('T')[0] : startStr;
      // Para la hora: tomar los primeros 5 chars después de T, ignorando offset
      let hora = '00:00';
      if(ev.start.dateTime){
        const timePart = ev.start.dateTime.split('T')[1]||'';
        hora = timePart.slice(0,5);
      }
      // Calcular duración del evento de Google
      let duracion_minutos=60;
      if(ev.start.dateTime && ev.end?.dateTime){
        const startD=new Date(ev.start.dateTime);
        const endD=new Date(ev.end.dateTime);
        duracion_minutos=Math.round((endD-startD)/60000);
      } else if(ev.start.date && ev.end?.date){
        // Evento de todo el día
        duracion_minutos=1440;
      }
      return {
        id: ev.id,
        titulo: ev.summary||'(sin título)',
        fecha,
        hora,
        detalle: ev.description||'',
        urgente: false,
        done: false,
        fuente: 'google',
        duracion_minutos
      };
    });
  }catch(e){ return []; }
}

async function crearEventoGcal(titulo, fecha, hora, detalle){
  return crearEventoGcalConInvitados(titulo, fecha, hora, detalle, 60, []);
}

async function crearEventoGcalConInvitados(titulo, fecha, hora, detalle, duracionMin, invitados){
  if(!gcalToken) return null;
  const inicio = `${fecha}T${hora}:00`;
  // Calcular fin sumando duración en minutos
  const [h,m] = hora.split(':').map(Number);
  const totalMin = h*60 + m + (duracionMin||60);
  const finH = Math.floor(totalMin/60);
  const finM = totalMin%60;
  // Manejar overflow de medianoche
  const finFecha = finH >= 24 
    ? new Date(new Date(fecha).getTime() + 86400000).toISOString().split('T')[0]
    : fecha;
  const finHStr = String(finH>=24?finH-24:finH).padStart(2,'0');
  const fin = `${finFecha}T${finHStr}:${String(finM).padStart(2,'0')}:00`;
  
  const body = {
    summary: titulo,
    description: detalle||'',
    start:{ dateTime: inicio, timeZone:'America/Bogota' },
    end:{ dateTime: fin, timeZone:'America/Bogota' }
  };
  
  // Agregar invitados si los hay
  if(invitados&&invitados.length){
    body.attendees = invitados.map(email=>({email}));
    body.guestsCanModifyEvent = false;
    body.sendUpdates = 'all'; // Envía invitación por correo automáticamente
  }
  
  try{
    const res = await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events', {
      method:'POST',
      headers:{ Authorization:`Bearer ${gcalToken}`, 'Content-Type':'application/json' },
      body: JSON.stringify(body)
    });
    if(res.ok && invitados&&invitados.length){
      const ev = await res.json();
      console.log('Evento creado con invitados:', ev.id, 'Invitados:', invitados);
    }
    return res.ok;
  }catch(e){ return false; }
}

async function drawMonth(){
  const y=calDate.getFullYear(),m=calDate.getMonth();
  const label=new Date(y,m,1).toLocaleDateString('es-CO',{month:'long',year:'numeric'});
  const el=document.getElementById('cal-period-label');
  if(el) el.textContent=label.charAt(0).toUpperCase()+label.slice(1);
  const body=document.getElementById('cal-body');
  if(!body)return;
  const primerDia=`${y}-${String(m+1).padStart(2,'0')}-01`;
  const ultimoDia=`${y}-${String(m+1).padStart(2,'0')}-${new Date(Date.UTC(y,m+1,0)).getUTCDate()}`;
  const gcalEvents=await fetchGcalEvents(primerDia,ultimoDia);
  window._lastGcalEvents=gcalEvents;
  const todosItems=[...agendaItems,...gcalEvents];
  const hoyStr=fechaHoyLocal();
  const firstDay=new Date(Date.UTC(y,m,1)).getUTCDay();
  const daysInMonth=new Date(Date.UTC(y,m+1,0)).getUTCDate();
  const daysInPrev=new Date(Date.UTC(y,m,0)).getUTCDate();
  const DAYS=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];

  function evClass(it){
    if(it.done) return 'ev-done';
    if(it.fuente==='google') return 'ev-google';
    if(it.urgente) return 'ev-urgente';
    return 'ev-satlock';
  }

  let html=`<div class="cal-month-wrap">
    <div class="cal-month-header">${DAYS.map(d=>`<div class="cal-month-dow">${d}</div>`).join('')}</div>
    <div class="cal-month-grid">`;

  for(let i=firstDay-1;i>=0;i--){
    const dd=daysInPrev-i;
    html+=`<div class="cal-month-cell other-month"><div class="cal-month-num">${dd}</div></div>`;
  }
  for(let d=1;d<=daysInMonth;d++){
    const iso=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=iso===hoyStr;
    const items=todosItems.filter(i=>i.fecha===iso).sort((a,b)=>a.hora.localeCompare(b.hora));
    const visible=items.slice(0,3);
    const mas=items.length-3;
    html+=`<div class="cal-month-cell${isToday?' today':''}" onclick="nuevaActividadFecha('${iso}')">
      <div class="cal-month-num">${d}</div>
      ${visible.map(it=>`<div class="cal-month-event ${evClass(it)}" onclick="event.stopPropagation();abrirEditarAgenda('${it.id}')" title="${it.hora.slice(0,5)} ${it.titulo} — clic para editar">${it.hora.slice(0,5)} ${it.titulo}</div>`).join('')}
      ${mas>0?`<div class="cal-month-more" onclick="event.stopPropagation();setCalView('week');calDate=new Date('${iso}');drawCal()">+${mas} más</div>`:''}
    </div>`;
  }
  const total=firstDay+daysInMonth;
  const rem=total%7===0?0:7-(total%7);
  for(let d=1;d<=rem;d++){
    html+=`<div class="cal-month-cell other-month"><div class="cal-month-num">${d}</div></div>`;
  }
  html+=`</div></div>`;
  body.innerHTML=html;
}

async function drawWeek(){
  const isoLocal=d=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  const dow=new Date(Date.UTC(calDate.getFullYear(),calDate.getMonth(),calDate.getDate())).getUTCDay();
  const monday=new Date(calDate);monday.setDate(calDate.getDate()-(dow===0?6:dow-1));
  const days=[];
  for(let i=0;i<7;i++){const dd=new Date(monday);dd.setDate(monday.getDate()+i);days.push(dd);}
  const isoLun=isoLocal(days[0]);
  const isoDom=isoLocal(days[6]);
  const gcalEventsW=await fetchGcalEvents(isoLun,isoDom);
  window._lastGcalEvents=gcalEventsW;
  const todosItemsW=[...agendaItems,...gcalEventsW];
  const hoyStr=fechaHoyLocal();
  const DAYS=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
  const HORA_INI=7, HORA_FIN=20; // 7am a 8pm
  const SLOTS_POR_HORA=4; // intervalos de 15min
  const SLOT_H=15; // px por slot de 15min

  const label=`${days[0].toLocaleDateString('es-CO',{day:'numeric',month:'short'})} – ${days[6].toLocaleDateString('es-CO',{day:'numeric',month:'short',year:'numeric'})}`;
  const el=document.getElementById('cal-period-label');
  if(el) el.textContent=label;
  const body=document.getElementById('cal-body');
  if(!body)return;

  function evClass(it){
    if(it.done) return 'ev-done';
    if(it.fuente==='google') return 'ev-google';
    if(it.urgente) return 'ev-urgente';
    return 'ev-satlock';
  }
  function horaToSlot(horaStr){
    const [h,min]=horaStr.split(':').map(Number);
    return (h-HORA_INI)*SLOTS_POR_HORA+Math.floor(min/15);
  }
  function slotToTop(slot){ return slot*SLOT_H; }
  function eventHeight(durMin){
    return Math.max(SLOT_H, Math.round((durMin||60)/15)*SLOT_H);
  }

  // Línea de ahora
  const ahora=new Date();
  const ahoraH=ahora.getHours()+(ahora.getMinutes()/60);
  const nowTop=ahoraH>=HORA_INI&&ahoraH<=HORA_FIN
    ?(ahoraH-HORA_INI)*SLOTS_POR_HORA*SLOT_H:null;

  const totalH=(HORA_FIN-HORA_INI)*SLOT_H*SLOTS_POR_HORA;

  // Header con días
  let hdrHtml=`<div class="cal-week-header" style="display:grid;grid-template-columns:52px repeat(7,1fr);border-bottom:0.5px solid var(--border);flex-shrink:0">
    <div style="border-right:0.5px solid var(--border)"></div>
    ${days.map((dd,i)=>{
      const iso=isoLocal(dd);
      const isToday=iso===hoyStr;
      return `<div class="cal-week-day-hdr${i===6?'':''}" style="${i===6?'':'border-right:0.5px solid var(--border)'}">
        <div class="cal-week-day-name">${DAYS[i]}</div>
        <div class="cal-week-day-num${isToday?' today-num':''}">${dd.getDate()}</div>
      </div>`;
    }).join('')}
  </div>`;

  // Cuerpo scrollable
  let bodyHtml=`<div style="flex:1;overflow-y:auto;position:relative">
    <div style="display:grid;grid-template-columns:52px repeat(7,1fr);position:relative;min-height:${totalH}px">`;

  // Columna de horas — label centrado en la línea de hora
  bodyHtml+=`<div style="position:relative">`;
  for(let h=HORA_INI;h<HORA_FIN;h++){
    for(let q=0;q<4;q++){
      const top=(h-HORA_INI)*4*SLOT_H+q*SLOT_H;
      bodyHtml+=`<div style="position:absolute;top:${top}px;left:0;right:0;height:${SLOT_H}px;${q===0?'border-top:0.5px solid var(--border)':'border-bottom:0.5px dashed rgba(0,0,0,0.06)'}">
        ${q===0?`<span style="font-size:10px;color:var(--text3);font-family:'Courier New',monospace;position:absolute;top:2px;right:6px;padding:0 2px;line-height:1">${String(h).padStart(2,'0')}:00</span>`:''}
      </div>`;
    }
  }
  bodyHtml+=`</div>`;

  // Columna por día
  days.forEach((dd,di)=>{
    const iso=isoLocal(dd);
    const isToday=iso===hoyStr;
    const dayItems=todosItemsW.filter(it=>it.fecha===iso);

    bodyHtml+=`<div style="position:relative;border-right:0.5px solid var(--border);${isToday?'background:rgba(25,66,140,0.02)':''}${di===6?';border-right:none':''}">`;

    // Líneas de horas — una línea sólida por hora, punteada por cuarto
    for(let h=HORA_INI;h<HORA_FIN;h++){
      // Línea sólida de hora
      const topH=(h-HORA_INI)*4*SLOT_H;
      bodyHtml+=`<div style="position:absolute;top:${topH}px;left:0;right:0;height:1px;background:var(--border);z-index:1;pointer-events:none"></div>`;
      // Slots clickeables de 15 min con líneas punteadas para cuartos
      for(let q=0;q<4;q++){
        const top=topH+q*SLOT_H;
        const horaClick=`${String(h).padStart(2,'0')}:${q===0?'00':q===1?'15':q===2?'30':'45'}`;
        bodyHtml+=`<div onclick="nuevaActividadFecha('${iso}','${horaClick}')" style="position:absolute;top:${top}px;left:0;right:0;height:${SLOT_H}px;${q>0?'border-bottom:0.5px dashed rgba(0,0,0,0.06)':''};cursor:pointer;transition:background .1s" onmouseover="this.style.background='rgba(25,66,140,0.05)'" onmouseout="this.style.background=''"></div>`;
      }
    }
    // Línea final
    bodyHtml+=`<div style="position:absolute;top:${(HORA_FIN-HORA_INI)*4*SLOT_H}px;left:0;right:0;height:1px;background:var(--border);pointer-events:none"></div>`;

    // Eventos
    dayItems.forEach(it=>{
      const slot=horaToSlot(it.hora||'07:00');
      if(slot<0||(it.hora&&parseInt(it.hora)>=HORA_FIN)) return;
      const top=Math.max(0,slotToTop(slot));
      const durMin=it.duracion_minutos||60;
      const h=Math.max(SLOT_H, Math.round(durMin/15)*SLOT_H);
      const durLabel=durMin<60?durMin+'min':durMin===60?'1h':Math.floor(durMin/60)+'h'+(durMin%60?durMin%60+'min':'');
      bodyHtml+=`<div class="cal-event-block ${evClass(it)}" style="top:${top}px;height:${h}px" onclick="abrirEditarAgenda('${it.id}')" title="${it.titulo} — clic para editar">
        <div class="cal-event-title">${it.titulo}</div>
        <div class="cal-event-time">${it.hora.slice(0,5)} · ${durLabel}${it.fuente==='google'?' · Google':''}</div>
      </div>`;
    });

    // Línea de ahora
    if(isToday&&nowTop!==null){
      bodyHtml+=`<div class="cal-now-line" style="top:${nowTop}px"><div class="cal-now-dot"></div></div>`;
    }

    bodyHtml+=`</div>`;
  });

  bodyHtml+=`</div></div>`;

  body.innerHTML=hdrHtml+bodyHtml;

  // Scroll a la hora actual o a las 8am
  const scrollTarget=nowTop?Math.max(0,nowTop-80):(HORA_INI+1)*4*SLOT_H;
  setTimeout(()=>{
    body.querySelector('[style*="overflow-y"]')?.scrollTo({top:scrollTarget,behavior:'smooth'});
  },100);
}

async function guardarEdicionAgenda(id){
  const invitadosEdit=document.getElementById('age-invitados')?.value.trim()||'';

  drawCal();
}

async function renderPendientes(container){
  // Cargar tareas manuales
  const {data:items}=await sb.from('pendientes').select('*').eq('usuario_id',USER.id).eq('done',false).order('created_at');
  // Cargar próximas acciones de oportunidades activas
  const hoy=fechaHoyLocal();
  let opQuery=sb.from('oportunidades').select('id,empresa,proxima_accion,fecha_proxima_accion,estado,usuarios(nombre)')
    .in('estado',['en_proceso','propuesta_enviada'])
    .not('proxima_accion','is',null)
    .neq('proxima_accion','');
  if(PERFIL.rol==='ejecutivo_fleet'||PERFIL.rol==='ejecutivo_carga'){
    opQuery=opQuery.eq('usuario_id',USER.id);
  }
  const {data:ops}=await opQuery.order('fecha_proxima_accion',{ascending:true,nullsFirst:false});

  const esJefe=['gerencia','jefe_fleet'].includes(PERFIL.rol);

  // Clasificar ops por vencimiento
  const opVencidas=(ops||[]).filter(o=>o.fecha_proxima_accion&&o.fecha_proxima_accion<hoy);
  const opHoy=(ops||[]).filter(o=>o.fecha_proxima_accion===hoy);
  const opProximas=(ops||[]).filter(o=>!o.fecha_proxima_accion||(o.fecha_proxima_accion>hoy));

  function opCard(o){
    const vencida=o.fecha_proxima_accion&&o.fecha_proxima_accion<hoy;
    const esHoy=o.fecha_proxima_accion===hoy;
    const color=vencida?'var(--red)':esHoy?'var(--sat-orange)':'var(--sat-blue)';
    const bg=vencida?'var(--red-light)':esHoy?'var(--sat-orange-light)':'var(--sat-blue-light)';
    const fd=o.fecha_proxima_accion?o.fecha_proxima_accion.split('-').reverse().join('/'):'Sin fecha';
    return `<div class="pend-item">
      <div class="prio-bar" style="background:${color}"></div>
      <div class="pend-body">
        <div class="pend-title" style="font-size:12px"><strong>${o.empresa}</strong> — ${o.proxima_accion}</div>
        <div class="pend-meta">${fd}${esJefe&&o.usuarios?` · ${o.usuarios.nombre}`:''}</div>
      </div>
      <button class="icon-btn" title="Ir al lead" onclick="switchTab(0)" style="color:var(--sat-blue)">→</button>
    </div>`;
  }

  function manualCard(it){
    return `<div class="pend-item">
      <div class="prio-bar ${it.prioridad}"></div>
      <div class="pend-body">
        <div class="pend-title">${it.titulo}</div>
        ${it.fecha_limite?`<div class="pend-meta">Vence: ${it.fecha_limite.split('-').reverse().join('/')}</div>`:''}
      </div>
      <button class="icon-btn" onclick="completarPend('${it.id}')">✓</button>
    </div>`;
  }

  container.innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <span style="font-size:13px;font-weight:500">Pendientes</span>
      <button class="btn-sec" onclick="nuevoPend()">+ Tarea manual</button>
    </div>

    ${opVencidas.length?`
    <div class="section-hdr" style="color:var(--red)">Vencidos (${opVencidas.length})</div>
    <div>${opVencidas.map(opCard).join('')}</div>`:''}

    ${opHoy.length?`
    <div class="section-hdr" style="color:var(--sat-orange)">Para hoy (${opHoy.length})</div>
    <div>${opHoy.map(opCard).join('')}</div>`:''}

    ${opProximas.length?`
    <div class="section-hdr">Próximas acciones (${opProximas.length})</div>
    <div>${opProximas.map(opCard).join('')}</div>`:''}

    ${(!opVencidas.length&&!opHoy.length&&!opProximas.length)?`<div style="font-size:12px;color:var(--text3);padding:16px 0">Sin próximas acciones en leads activos</div>`:''}

    <div class="section-hdr" style="margin-top:20px">Tareas manuales</div>
    ${['alta','media','baja'].map(p=>{
      const sub=(items||[]).filter(x=>x.prioridad===p);
      return sub.length?`<div>${sub.map(manualCard).join('')}</div>`:'';
    }).join('')}
    ${!(items&&items.length)?'<div style="font-size:11px;color:var(--text3);padding:6px 0">Sin tareas manuales — use "+ Tarea manual" para agregar</div>':''}
  `;
}

// ── 15·5·1 ───────────────────────────────────────────────────────────────────
function getMetasQCO(linea, rol){
  if(rol==='gerencia'||rol==='jefe_fleet'){
    return {c:999,q:999,ci:999,periodo:'mensual',periodoLabel:'mes',sinCuota:true};
  }
  return linea==='fleet'
    ? {c:15,q:5,ci:1,periodo:'quincenal',periodoLabel:'quincena',sinCuota:false}
    : {c:15,q:5,ci:1,periodo:'mensual',periodoLabel:'mes',sinCuota:false};
}
function getQuincenaActual(){
  const d=new Date().getDate();
  return d<=15?1:2;
}
function getSemaforo(pct){
  if(pct>=85) return {color:'var(--green)',bg:'var(--green-light)',label:'En meta'};
  if(pct>=50) return {color:'var(--amber)',bg:'var(--amber-light)',label:'En riesgo'};
  return {color:'var(--red)',bg:'var(--red-light)',label:'Bajo meta'};
}
async function renderQCO(container){
  const hoy=new Date();
  const mes=hoy.getMonth()+1; const anio=hoy.getFullYear();
  const quincena=getQuincenaActual();
  const metas=getMetasQCO(PERFIL.linea, PERFIL.rol);
  const sinCuota=metas.sinCuota||false;

  // Calcular automáticamente desde oportunidades
  let query=sb.from('oportunidades').select('estado,created_at,updated_at').eq('usuario_id',USER.id);
  const {data:ops}=await query;
  const allOps=ops||[];

  // Para Fleet: filtrar por quincena actual
  // Para Carga: todo el mes
  const enPeriodo=(fecha)=>{
    if(!fecha) return false;
    const d=new Date(fecha);
    if(d.getMonth()+1!==mes||d.getFullYear()!==anio) return false;
    if(PERFIL.linea==='fleet'){
      const dia=d.getDate();
      return quincena===1?(dia>=1&&dia<=15):(dia>=16);
    }
    return true;
  };

  // Contactos = leads creados en el período
  const contactos=allOps.filter(o=>enPeriodo(o.created_at)).length;
  // Cotizaciones = leads que están en propuesta_enviada O llegaron a ese estado (aproximado: leads con propuesta o cerrado)
  const cotizaciones=allOps.filter(o=>
    ['propuesta_enviada','cerrado'].includes(o.estado) && enPeriodo(o.created_at)
  ).length;
  // Cierres = leads cerrados en el período
  const cierres=allOps.filter(o=>o.estado==='cerrado'&&enPeriodo(o.updated_at)).length;

  const pctC=sinCuota?100:Math.min(100,metas.c>0?Math.round(contactos/metas.c*100):0);
  const pctQ=sinCuota?100:Math.min(100,metas.q>0?Math.round(cotizaciones/metas.q*100):0);
  const pctCi=sinCuota?100:Math.min(100,metas.ci>0?Math.round(cierres/metas.ci*100):0);
  const puntaje=calcPuntaje(contactos,cotizaciones,cierres,metas);

  const semC=semaforoRow(pctC),semQ=semaforoRow(pctQ),semCi=semaforoRow(pctCi);
  const overall=sinCuota?{cls:'card-blue',txt:'var(--sat-blue)'}:semaforoRow(puntaje);

  const periodoLabel=PERFIL.linea==='fleet'
    ?`Quincena ${quincena===1?'1 (1-15)':'2 (16-'+new Date(anio,mes,0).getDate()+')'} — ${['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'][mes-1]} ${anio}`
    :`${['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'][mes-1]} ${anio}`;

  container.innerHTML=`
    <div style="max-width:480px;margin:0 auto">
      <div style="font-size:13px;font-weight:500;color:var(--text);margin-bottom:4px">15 · 5 · 1</div>
      <div style="font-size:11px;color:var(--text3);margin-bottom:16px">${periodoLabel} — calculado automáticamente desde tus leads</div>

      <div class="exec-card-151 ${overall.cls}" style="margin-bottom:16px">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
          <div class="exec-avatar-151" style="background:var(--sat-blue)">${PERFIL.nombre.split(' ').map(p=>p[0]).join('').slice(0,2).toUpperCase()}</div>
          <div style="flex:1">
            <div style="font-size:13px;font-weight:500">${PERFIL.nombre}</div>
            <div style="font-size:10px;color:var(--text3)">${PERFIL.cargo||PERFIL.linea}</div>
          </div>
          ${!sinCuota?`<div style="text-align:right">
            <div style="font-size:22px;font-weight:300;color:${overall.txt};font-family:'Courier New',monospace">${puntaje}</div>
            <div style="font-size:9px;color:var(--text3)">puntos</div>
          </div>`:''}
        </div>

        ${!sinCuota?`
        ${[{lbl:'Contactos (leads creados)',val:contactos,meta:metas.c,pct:pctC,sem:semC},
           {lbl:'Cotizaciones (propuestas enviadas)',val:cotizaciones,meta:metas.q,pct:pctQ,sem:semQ},
           {lbl:'Cierres',val:cierres,meta:metas.ci,pct:pctCi,sem:semCi}
          ].map(m=>`
          <div style="margin-bottom:10px">
            <div style="display:flex;justify-content:space-between;margin-bottom:3px">
              <span style="font-size:11px;color:var(--text2)">${m.lbl}</span>
              <span style="font-size:12px;font-weight:600;color:${m.sem.txt}">${m.val} / ${m.meta}</span>
            </div>
            <div class="m151-bar"><div class="m151-fill ${m.sem.fill}" style="width:${m.pct}%"></div></div>
          </div>`).join('')}`:'<div style="font-size:12px;color:var(--text3);text-align:center;padding:8px 0">Vista gerencial — sin cuota asignada</div>'}
      </div>

      <div style="background:var(--surface2);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px 16px">
        <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:8px">¿Cómo se calculan estos números?</div>
        <div style="font-size:11px;color:var(--text2);line-height:1.7">
          <strong>Contactos:</strong> leads creados en este período.<br>
          <strong>Cotizaciones:</strong> leads en estado "Propuesta enviada" o "Cerrado" creados en este período.<br>
          <strong>Cierres:</strong> leads marcados como "Cerrado" en este período.
        </div>
      </div>
    </div>`;
}

function ultimaGestion(opId){
  const gg = (window._diarioGestiones||[]).filter(g=>g.oportunidad_id===opId);
  if(!gg.length) return null;
  return gg.sort((a,b)=>new Date(b.created_at||b.fecha) - new Date(a.created_at||a.fecha))[0];
}

function semaforoDiario(opId, fechaInicio, estado){
  const ult = ultimaGestion(opId);
  if(estado==='cerrado'){
    return {cls:'verde',diasFaltan:null,label:'Cerrado',diasProx:null};
  }
  if(ult&&ult.proxima_gestion){
    const hoy=fechaHoyLocal();
    const [py,pm,pd]=ult.proxima_gestion.slice(0,10).split('-').map(Number);
    const [hy,hm,hd]=hoy.split('-').map(Number);
    const diasFaltan=Math.ceil((Date.UTC(py,pm-1,pd)-Date.UTC(hy,hm-1,hd))/(1000*60*60*24));
    if(diasFaltan<0) return {cls:'rojo',diasFaltan,label:`Vencido ${Math.abs(diasFaltan)}d`,diasProx:ult.proxima_gestion};
    if(diasFaltan<=5) return {cls:'amarillo',diasFaltan,label:`${diasFaltan}d para gestión`,diasProx:ult.proxima_gestion};
    return {cls:'verde',diasFaltan,label:`${diasFaltan}d para gestión`,diasProx:ult.proxima_gestion};
  }
  const refFecha = ult ? ult.fecha : fechaInicio;
  if(!refFecha) return {cls:'gris',diasFaltan:null,label:'Sin gestión',diasProx:null};
  const dias = diasGestion(refFecha, null);
  if(dias<=15) return {cls:'verde',diasFaltan:30-dias,label:`${30-dias}d restantes`,diasProx:null};
  if(dias<=30) return {cls:'amarillo',diasFaltan:30-dias,label:`${30-dias}d restantes ⚠`,diasProx:null};
  return {cls:'rojo',diasFaltan:dias-30,label:`${dias}d sin gestión !`,diasProx:null};
}

async function completarTareaAdmin(id){
  await sb.from('tareas_admin').update({done:true}).eq('id',id);
  const idx=(window._tareasAdmin||[]).findIndex(t=>t.id===id);
  if(idx>-1) window._tareasAdmin[idx].done=true;
  // También mover a completadas
  const tarea=window._tareasAdmin[idx];
  if(tarea && !(window._tareasCompletadas||[]).find(t=>t.id===id)){
    window._tareasCompletadas=[tarea,...(window._tareasCompletadas||[])];
  }
  renderDiarioLista(document.getElementById('diario-search')?.value||'',_diarioFiltro);
}

function toggleCompletadas(){
  const lista=document.getElementById('lista-completadas');
  const icon=document.getElementById('icon-completadas');
  if(!lista) return;
  const visible=lista.style.display!=='none';
  lista.style.display=visible?'none':'block';
  if(icon) icon.textContent=visible?'▶':'▼';
}

async function reactivarTareaAdmin(id){
  await sb.from('tareas_admin').update({done:false}).eq('id',id);

async function guardarSeguimientoTarea(tareaId){
  const nota=document.getElementById('st-nota')?.value.trim();
  if(!nota){alert('Escriba una nota del avance.');return;}
  const proxGest=document.getElementById('st-prox')?.value||null;
  const proxHora=document.getElementById('st-hora')?.value||null;
  const {error}=await sb.from('seguimiento_tareas').insert({
    tarea_id:tareaId, usuario_id:USER.id, nota,
    proxima_gestion:proxGest||null
  });
  // Actualizar fecha_limite y hora_limite de la tarea si se definió próxima gestión
  if(proxGest){
    await sb.from('tareas_admin').update({fecha_limite:proxGest, hora_limite:proxHora}).eq('id',tareaId);
    const idx=(window._tareasAdmin||[]).findIndex(t=>t.id===tareaId);
    if(idx>-1) window._tareasAdmin[idx].fecha_limite=proxGest;
  }
  if(error){alert('Error: '+error.message);return;}
  document.getElementById('st-nota').value='';
  // Refrescar el modal
  document.getElementById('modal-tarea').remove();
  editarTareaAdmin(tareaId);
}

function renderDiarioLista(q, filtro){
  filtro=filtro||_diarioFiltro||'todos';
  const lista=document.getElementById('diario-lista');
  if(!lista) return;
  let ops=window._diarioOps||[];
  if(q){ const ql=q.toLowerCase(); ops=ops.filter(o=>o.empresa.toLowerCase().includes(ql)||(o.contacto||'').toLowerCase().includes(ql)); }

  const hoyStr=fechaHoyLocal();
  const enSemana=new Date(); enSemana.setDate(enSemana.getDate()+7);
  const enSemanaStr=enSemana.getFullYear()+'-'+String(enSemana.getMonth()+1).padStart(2,'0')+'-'+String(enSemana.getDate()).padStart(2,'0');

  if(filtro==='urgentes') ops=ops.filter(o=>semaforoDiario(o.id,o.fecha_inicio_gestion,o.estado).cls==='rojo');
  else if(filtro==='hoy') ops=ops.filter(o=>{ const s=semaforoDiario(o.id,o.fecha_inicio_gestion,o.estado); return s.diasProx===hoyStr||(s.diasFaltan!==null&&s.diasFaltan<=0); });
  else if(filtro==='semana') ops=ops.filter(o=>{ const s=semaforoDiario(o.id,o.fecha_inicio_gestion,o.estado); return s.diasProx&&s.diasProx<=enSemanaStr; });

  // Contadores
  const allOps=window._diarioOps||[];
  const nRojo=allOps.filter(o=>semaforoDiario(o.id,o.fecha_inicio_gestion,o.estado).cls==='rojo').length;
  const nAmarillo=allOps.filter(o=>semaforoDiario(o.id,o.fecha_inicio_gestion,o.estado).cls==='amarillo').length;
  const nVerde=allOps.filter(o=>semaforoDiario(o.id,o.fecha_inicio_gestion,o.estado).cls==='verde').length;
  const resumen=document.getElementById('diario-resumen');
  if(resumen) resumen.innerHTML=`
    <div style="background:var(--red-light);border-radius:8px;padding:8px 14px;display:flex;align-items:center;gap:8px;cursor:pointer" onclick="setFiltroDiario('urgentes',document.getElementById('dfiltro-urgentes'))">
      <span style="width:8px;height:8px;border-radius:50%;background:var(--red);display:inline-block"></span>
      <span style="font-size:11px;color:var(--red-dark)"><strong>${nRojo}</strong> vencidos / urgentes</span>
    </div>
    <div style="background:var(--amber-light);border-radius:8px;padding:8px 14px;display:flex;align-items:center;gap:8px;cursor:pointer" onclick="setFiltroDiario('semana',document.getElementById('dfiltro-semana'))">
      <span style="width:8px;height:8px;border-radius:50%;background:var(--amber);display:inline-block"></span>
      <span style="font-size:11px;color:var(--amber)"><strong>${nAmarillo}</strong> próximos (≤5 días)</span>
    </div>
    <div style="background:var(--green-light);border-radius:8px;padding:8px 14px;display:flex;align-items:center;gap:8px">
      <span style="width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block"></span>
      <span style="font-size:11px;color:var(--green)"><strong>${nVerde}</strong> al día</span>
    </div>`;

  // Ordenar: más urgentes primero
  ops=[...ops].sort((a,b)=>{
    const sa=semaforoDiario(a.id,a.fecha_inicio_gestion,a.estado);
    const sb2=semaforoDiario(b.id,b.fecha_inicio_gestion,b.estado);

    return (ord[sa.cls]||0)-(ord[sb2.cls]||0)||(sa.diasFaltan||999)-(sb2.diasFaltan||999);
  });

  if(!ops.length){ lista.innerHTML='<div class="empty">Sin clientes que requieran atención con este filtro.</div>'; return; }

  const TIPOS={llamada:'📞',whatsapp:'💬',correo:'✉',presencial:'🤝',otro:'•'};

            <span style="font-size:10px;color:${prioColor[t.prioridad]||'var(--text3)'}">● ${t.prioridad}</span>
          </div>
          <button onclick="event.stopPropagation();completarTareaAdmin('${t.id}')" style="margin-left:8px;font-family:inherit;font-size:11px;padding:4px 10px;border:0.5px solid var(--green);border-radius:var(--radius-sm);background:var(--green-light);color:var(--green);cursor:pointer">✓ Listo</button>
        </div>
      </div>`;
    }).join('')}`:'';

  // Actualizar contadores
  const leadsCount=document.getElementById('leads-count');

  if(tareasListaEl){
    const tareasAll=window._tareasAdmin||[];
    let tareasFiltered=[...tareasAll];
    const hoyStr3=fechaHoyLocal();
    const semStr=(() => { const d=new Date(); d.setDate(d.getDate()+7); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); })();
    if(filtro==='urgentes') tareasFiltered=tareasFiltered.filter(t=>t.fecha_limite&&t.fecha_limite<hoyStr3);
    else if(filtro==='hoy') tareasFiltered=tareasFiltered.filter(t=>t.fecha_limite===hoyStr3);
    else if(filtro==='semana') tareasFiltered=tareasFiltered.filter(t=>t.fecha_limite&&t.fecha_limite<=semStr);
    if(q){ const ql=q.toLowerCase(); tareasFiltered=tareasFiltered.filter(t=>t.titulo.toLowerCase().includes(ql)||(t.cliente||'').toLowerCase().includes(ql)); }
    if(tareasCount) tareasCount.textContent=tareasFiltered.length;
    // Si filtro es 'completadas', mostrar solo las completadas
    if(filtro==='completadas'){
      const completadas=(window._tareasCompletadas||[]);

      }
